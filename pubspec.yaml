name: iftiinshe
description: "Elite School Management System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Icons
  cupertino_icons: ^1.0.8

  # Networking
  http: ^1.2.2
  
  # Date & Formatting
